name: Auto Checker Proxy

on:
  schedule:
    # Запуск каждые 40 минут
    - cron: '*/40 * * * *'
  workflow_dispatch: # Позволяет запускать скрипт вручную кнопкой в интерфейсе GitHub

jobs:
  check-and-publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Proxy Checker
      run: python main.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add checked.txt subscription.txt sub_base64.txt
        # Коммитим только если есть изменения, чтобы избежать ошибок пустых коммитов
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update proxy subscription [skip ci]" && git push)
